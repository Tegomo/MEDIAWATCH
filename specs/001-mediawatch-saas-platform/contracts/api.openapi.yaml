openapi: 3.0.3
info:
  title: MediaWatch CI API
  description: |
    API REST pour la plateforme MediaWatch CI - Veille médias automatisée pour la Côte d'Ivoire.
    
    Cette API permet aux clients de gérer leurs mots-clés, consulter leurs mentions,
    configurer des alertes, et accéder aux analytics de veille médias.
  version: 1.0.0
  contact:
    name: MediaWatch CI Support
    email: support@mediawatch.ci

servers:
  - url: https://api.mediawatch.ci/v1
    description: Production
  - url: https://staging-api.mediawatch.ci/v1
    description: Staging
  - url: http://localhost:8000/v1
    description: Développement local

tags:
  - name: auth
    description: Authentification et gestion de session
  - name: keywords
    description: Gestion des mots-clés de surveillance
  - name: mentions
    description: Consultation des mentions détectées
  - name: analytics
    description: Statistiques et visualisations
  - name: alerts
    description: Configuration des alertes
  - name: exports
    description: Export de données (CSV, PDF)
  - name: admin
    description: Fonctions administrateur (sources, clients)

security:
  - BearerAuth: []

paths:
  # ==================== AUTHENTICATION ====================
  /auth/login:
    post:
      tags: [auth]
      summary: Connexion utilisateur
      description: Authentifie un utilisateur via Supabase et retourne un token JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@agence.ci
                password:
                  type: string
                  format: password
                  example: SecurePass123!
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 3600
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rafraîchir le token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token rafraîchi
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer

  # ==================== KEYWORDS ====================
  /keywords:
    get:
      tags: [keywords]
      summary: Lister les mots-clés
      description: Récupère tous les mots-clés de l'organisation de l'utilisateur
      parameters:
        - name: enabled
          in: query
          schema:
            type: boolean
          description: Filtrer par statut activé/désactivé
      responses:
        '200':
          description: Liste des mots-clés
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Keyword'
                  total:
                    type: integer
                  limit_reached:
                    type: boolean
                    description: True si limite de plan atteinte

    post:
      tags: [keywords]
      summary: Créer un mot-clé
      description: Ajoute un nouveau mot-clé à surveiller
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: Orange CI
                category:
                  type: string
                  enum: [brand, product, person, competitor, custom]
                  example: brand
                alert_enabled:
                  type: boolean
                  default: true
                alert_threshold:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  default: 0.3
                  description: Seuil de sentiment négatif pour alertes (0-1)
      responses:
        '201':
          description: Mot-clé créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Keyword'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Mot-clé déjà existant ou limite atteinte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /keywords/{keyword_id}:
    parameters:
      - $ref: '#/components/parameters/KeywordId'
    
    get:
      tags: [keywords]
      summary: Détails d'un mot-clé
      responses:
        '200':
          description: Détails du mot-clé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Keyword'
        '404':
          $ref: '#/components/responses/NotFound'
    
    patch:
      tags: [keywords]
      summary: Modifier un mot-clé
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                category:
                  type: string
                enabled:
                  type: boolean
                alert_enabled:
                  type: boolean
                alert_threshold:
                  type: number
                  format: float
      responses:
        '200':
          description: Mot-clé mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Keyword'
    
    delete:
      tags: [keywords]
      summary: Supprimer un mot-clé
      responses:
        '204':
          description: Mot-clé supprimé

  # ==================== MENTIONS ====================
  /mentions:
    get:
      tags: [mentions]
      summary: Lister les mentions
      description: Récupère les mentions avec filtres et pagination
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            enum: [25, 50, 100]
            default: 25
        - name: keyword_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrer par mot-clé
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrer par source
        - name: sentiment
          in: query
          schema:
            type: string
            enum: [negative, neutral, positive]
          description: Filtrer par sentiment
        - name: theme
          in: query
          schema:
            type: string
            enum: [politics, economy, sport, society]
          description: Filtrer par thème
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Date début (YYYY-MM-DD)
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Date fin (YYYY-MM-DD)
        - name: sort
          in: query
          schema:
            type: string
            enum: [date_desc, date_asc, sentiment_desc, visibility_desc]
            default: date_desc
      responses:
        '200':
          description: Liste des mentions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mention'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /mentions/{mention_id}:
    parameters:
      - $ref: '#/components/parameters/MentionId'
    
    get:
      tags: [mentions]
      summary: Détails d'une mention
      description: Récupère les détails complets d'une mention incluant l'article
      responses:
        '200':
          description: Détails de la mention
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentionDetail'

  # ==================== ANALYTICS ====================
  /analytics/trends:
    get:
      tags: [analytics]
      summary: Tendances de mentions
      description: Données pour graphiques de tendances (volume et sentiment)
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [7d, 30d]
          description: Période d'analyse
        - name: keyword_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrer par mot-clé spécifique
      responses:
        '200':
          description: Données de tendances
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                  data_points:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        total_mentions:
                          type: integer
                        positive_count:
                          type: integer
                        neutral_count:
                          type: integer
                        negative_count:
                          type: integer
                        avg_sentiment:
                          type: number
                          format: float

  /analytics/sources:
    get:
      tags: [analytics]
      summary: Répartition par sources
      description: Top sources par nombre de mentions
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d]
            default: 7d
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Statistiques par source
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        source:
                          $ref: '#/components/schemas/Source'
                        mention_count:
                          type: integer
                        avg_sentiment:
                          type: number
                          format: float

  # ==================== ALERTS ====================
  /alerts/settings:
    get:
      tags: [alerts]
      summary: Récupérer paramètres alertes
      responses:
        '200':
          description: Paramètres alertes utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSettings'
    
    patch:
      tags: [alerts]
      summary: Modifier paramètres alertes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alert_enabled:
                  type: boolean
                alert_threshold:
                  type: number
                  format: float
                alert_frequency:
                  type: string
                  enum: [immediate, hourly, daily, disabled]
      responses:
        '200':
          description: Paramètres mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSettings'

  # ==================== EXPORTS ====================
  /exports/csv:
    post:
      tags: [exports]
      summary: Exporter en CSV
      description: Génère un export CSV des mentions filtrées
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Export CSV (si <500 mentions)
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '202':
          description: Export en cours (si >500 mentions, envoi par email)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Export en cours, vous recevrez un email avec le lien de téléchargement
                  estimated_time:
                    type: integer
                    description: Temps estimé en secondes

  /exports/pdf:
    post:
      tags: [exports]
      summary: Exporter en PDF
      description: Génère un rapport PDF formaté avec graphiques
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '202':
          description: Génération PDF en cours
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  estimated_time:
                    type: integer

  # ==================== ADMIN ====================
  /admin/sources:
    get:
      tags: [admin]
      summary: Lister toutes les sources (Admin)
      description: Récupère toutes les sources avec statut de scraping
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ok, failing, disabled]
      responses:
        '200':
          description: Liste des sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceAdmin'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/sources/{source_id}/retry:
    post:
      tags: [admin]
      summary: Réessayer scraping source (Admin)
      parameters:
        - name: source_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Scraping relancé
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /admin/organizations:
    get:
      tags: [admin]
      summary: Lister organisations (Admin)
      responses:
        '200':
          description: Liste des organisations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationAdmin'

  /admin/organizations/{org_id}/suspend:
    post:
      tags: [admin]
      summary: Suspendre organisation (Admin)
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Organisation suspendue

  /admin/organizations/{org_id}/reactivate:
    post:
      tags: [admin]
      summary: Réactiver organisation (Admin)
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organisation réactivée

# ==================== COMPONENTS ====================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    KeywordId:
      name: keyword_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    
    MentionId:
      name: mention_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [admin, client, viewer]
        organization_id:
          type: string
          format: uuid

    Keyword:
      type: object
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        category:
          type: string
        enabled:
          type: boolean
        alert_enabled:
          type: boolean
        alert_threshold:
          type: number
          format: float
        total_mentions_count:
          type: integer
        last_mention_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Mention:
      type: object
      properties:
        id:
          type: string
          format: uuid
        keyword:
          type: object
          properties:
            id:
              type: string
              format: uuid
            text:
              type: string
        article:
          type: object
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
            url:
              type: string
              format: uri
            published_at:
              type: string
              format: date-time
        source:
          $ref: '#/components/schemas/Source'
        matched_text:
          type: string
        match_context:
          type: string
          description: Extrait avec contexte autour du match
        sentiment_score:
          type: number
          format: float
          minimum: -1
          maximum: 1
        sentiment_label:
          type: string
          enum: [negative, neutral, positive]
        visibility_score:
          type: number
          format: float
        theme:
          type: string
        detected_at:
          type: string
          format: date-time

    MentionDetail:
      allOf:
        - $ref: '#/components/schemas/Mention'
        - type: object
          properties:
            article_full:
              type: object
              properties:
                cleaned_content:
                  type: string
                  description: Contenu complet de l'article
                author:
                  type: string
                extracted_entities:
                  type: object
                  properties:
                    persons:
                      type: array
                      items:
                        type: string
                    organizations:
                      type: array
                      items:
                        type: string
                    locations:
                      type: array
                      items:
                        type: string

    Source:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
          enum: [press, whatsapp, rss, api]
        prestige_score:
          type: number
          format: float

    SourceAdmin:
      allOf:
        - $ref: '#/components/schemas/Source'
        - type: object
          properties:
            scraping_enabled:
              type: boolean
            last_scrape_at:
              type: string
              format: date-time
            last_success_at:
              type: string
              format: date-time
            consecutive_failures:
              type: integer
            last_error_message:
              type: string

    OrganizationAdmin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        subscription_plan:
          type: string
        subscription_status:
          type: string
        keyword_count:
          type: integer
        user_count:
          type: integer
        total_mentions:
          type: integer
        created_at:
          type: string
          format: date-time

    AlertSettings:
      type: object
      properties:
        alert_enabled:
          type: boolean
        alert_threshold:
          type: number
          format: float
        alert_frequency:
          type: string
          enum: [immediate, hourly, daily, disabled]

    ExportRequest:
      type: object
      properties:
        filters:
          type: object
          properties:
            keyword_id:
              type: string
              format: uuid
            source_id:
              type: string
              format: uuid
            sentiment:
              type: string
            date_from:
              type: string
              format: date
            date_to:
              type: string
              format: date
        include_charts:
          type: boolean
          default: false
          description: Inclure graphiques (PDF uniquement)

    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Accès refusé
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
